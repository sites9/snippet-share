<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevHub Pro</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --green: #00ff41;
        }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: monospace;
            margin: 0;
            padding-bottom: 80px;
        }

        .page {
            display: none;
            padding: 15px;
        }

        .active {
            display: block;
        }

        .card {
            border: 1px solid var(--green);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #111;
            border-top: 1px solid var(--green);
            z-index: 100;
        }

        nav button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: var(--green);
            font-weight: bold;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 200;
        }

        input,
        textarea,
        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a1a;
            border: 1px solid var(--green);
            color: var(--green);
            box-sizing: border-box;
            font-family: monospace;
        }

        button {
            background: var(--green);
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        #searchBar {
            border: 2px solid var(--green);
            margin-bottom: 15px;
            color: white;
        }
    </style>
</head>

<body>

    <div id="homePage" class="page active">
        <h3>Live Snippets</h3>
        <input type="text" id="searchBar" placeholder="Search snippets..." onkeyup="filterSnippets()">
        <div id="snippetList">Loading snippets...</div>
    </div>

    <div id="profilePage" class="page">
        <div id="authBox">
            <h3>Login / Register</h3>
            <input id="userName" placeholder="Name">
            <input id="userEmail" placeholder="Email">
            <input id="userLevel" placeholder="Coding Level">
            <button onclick="handleAuth()">LOGIN / REGISTER</button>
        </div>
        <div id="idCard" class="card" style="display:none;">
            <h3>USER ID CARD</h3>
            <p id="cName"></p>
            <p id="cEmail"></p>
            <p id="cLevel"></p>
            <div><span id="cShared">Shared: 0</span></div>
        </div>
        <button id="shareBtn" style="display:none;" onclick="openModal('shareModal')">SHARE NEW SNIPPET</button>
    </div>

    <div id="shareModal" class="modal">
        <h3>New Snippet</h3>
        <input id="sName" placeholder="Snippet Name">
        <input id="sType" placeholder="Work Type">
        <textarea id="sCode" rows="5" placeholder="Code here..."></textarea>
        <textarea id="sComment" placeholder="Initial comment..."></textarea>
        <button onclick="postSnippet()">SUBMIT</button>
        <button onclick="closeModal('shareModal')">CLOSE</button>
    </div>

    <div id="viewModal" class="modal">
        <h3 id="vName"></h3>
        <pre id="vCode" style="background:#000; padding:10px; border:1px solid #333; overflow:auto;"></pre>
        <div id="vCommentsList"></div>
        <div id="commentSection"></div>
        <button onclick="closeModal('viewModal')">CLOSE</button>
    </div>

    <nav>
        <button onclick="showPage('homePage')">HOME</button>
        <button onclick="showPage('profilePage')">PROFILE</button>
    </nav>

    <script>
        const BASE_URL = "https://slace-4d2ae-default-rtdb.asia-southeast1.firebasedatabase.app";
        let allSnippets = [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function openModal(id) {
            document.getElementById(id).style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        async function handleAuth() {
            const name = document.getElementById('userName').value;
            const res = await fetch(`${BASE_URL}/users.json`);
            const users = await res.json();
            let userObj = {
                name,
                email: document.getElementById('userEmail').value,
                level: document.getElementById('userLevel').value
            };

            let exists = false;
            for (let id in users)
                if (users[id].name === name) {
                    userObj = users[id];
                    exists = true;
                }
            if (!exists) await fetch(`${BASE_URL}/users.json`, {
                method: 'POST',
                body: JSON.stringify(userObj)
            });

            localStorage.setItem('currentUser', JSON.stringify(userObj));
            location.reload();
        }

        async function fetchSnippets() {
            const res = await fetch(`${BASE_URL}/snippets.json`);
            const data = await res.json();
            allSnippets = [];
            const list = document.getElementById('snippetList');
            list.innerHTML = '';
            const user = JSON.parse(localStorage.getItem('currentUser'));
            let shared = 0;

            for (let id in data) {
                let s = data[id];
                s.id = id;
                allSnippets.push(s);
                if (user && s.owner === user.name) shared++;

                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>${s.name}</strong><br><small>Type: ${s.workType || 'N/A'} | Watched: ${s.watched || 0}</small>`;
                div.onclick = () => showViewModal(s);
                list.appendChild(div);
            }
            if (user) document.getElementById('cShared').innerText = "Shared: " + shared;
        }

        function showViewModal(s) {
            updateWatched(s.id, s);
            document.getElementById('vName').innerText = s.name;
            document.getElementById('vCode').innerText = s.code;
            let cHtml = "<strong>Comments:</strong><br>";
            if (s.comments)
                for (let id in s.comments) cHtml += `<p style="font-size:0.8em;">- ${s.comments[id].user}: ${s.comments[id].text}</p>`;
            document.getElementById('vCommentsList').innerHTML = cHtml;
            document.getElementById('commentSection').innerHTML = `<textarea id="newComment" placeholder="Comment..."></textarea><button onclick="addComment('${s.id}')">POST</button>`;
            openModal('viewModal');
        }

        async function updateWatched(key, s) {
            await fetch(`${BASE_URL}/snippets/${key}.json`, {
                method: 'PATCH',
                body: JSON.stringify({
                    watched: (s.watched || 0) + 1
                })
            });
        }

        async function addComment(id) {
            const text = document.getElementById('newComment').value;
            const user = JSON.parse(localStorage.getItem('currentUser'));
            await fetch(`${BASE_URL}/snippets/${id}/comments.json`, {
                method: 'POST',
                body: JSON.stringify({
                    user: user ? user.name : "Anonymous",
                    text
                })
            });
            closeModal('viewModal');
            fetchSnippets();
        }

        async function postSnippet() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            await fetch(`${BASE_URL}/snippets.json`, {
                method: 'POST',
                body: JSON.stringify({
                    name: document.getElementById('sName').value,
                    workType: document.getElementById('sType').value,
                    code: document.getElementById('sCode').value,
                    owner: user ? user.name : "Anonymous",
                    watched: 0
                })
            });
            closeModal('shareModal');
            fetchSnippets();
        }

        function filterSnippets() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            document.getElementById('snippetList').innerHTML = '';
            allSnippets.filter(s => s.name.toLowerCase().includes(query)).forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>${s.name}</strong>`;
                div.onclick = () => showViewModal(s);
                document.getElementById('snippetList').appendChild(div);
            });
        }

        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (user) {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('idCard').style.display = 'block';
            document.getElementById('shareBtn').style.display = 'block';
            document.getElementById('cName').innerText = "Name: " + user.name;
            document.getElementById('cEmail').innerText = "Email: " + user.email;
            document.getElementById('cLevel').innerText = "Level: " + user.level;
        }
        fetchSnippets();
    </script>
</body>

</html>
