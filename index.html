<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevHub Pro</title>
    <style>
        :root { --bg: #0d0d0d; --green: #00ff41; }
        body { background: var(--bg); color: var(--green); font-family: monospace; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 15px; } .active { display: block; }
        .card { border: 1px solid var(--green); padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 1px solid var(--green); z-index: 100; }
        nav button { flex: 1; padding: 15px; background: none; border: none; color: var(--green); font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 200; }
        input, textarea, button { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid var(--green); color: var(--green); box-sizing: border-box; font-family: monospace; }
        button { background: var(--green); color: black; font-weight: bold; border: none; cursor: pointer; }
        #searchBar { border: 2px solid var(--green); margin-bottom: 15px; color: white; }
    </style>
</head>
<body>

<div id="homePage" class="page active">
    <h3>Live Snippets</h3>
    <input type="text" id="searchBar" placeholder="Search snippets..." onkeyup="filterSnippets()">
    <div id="snippetList">Loading...</div>
</div>

<div id="profilePage" class="page">
    <div id="authBox">
        <h3>Login / Register</h3>
        <input id="userName" placeholder="Name">
        <input id="userEmail" placeholder="Email">
        <input id="userLevel" placeholder="Coding Level">
        <input id="userPass" type="password" placeholder="Password">
        <button onclick="handleAuth()">LOGIN / REGISTER</button>
    </div>
    <div id="idCard" class="card" style="display:none;">
        <h3>USER ID CARD</h3>
        <p id="cName"></p>
        <p id="cEmail"></p>
        <p id="cLevel"></p>
        <div><span id="cShared">Shared: 0</span></div>
        <button style="background: #ff4141; color: white; margin-top: 10px;" onclick="logout()">LOG OUT</button>
    </div>
    <button id="shareBtn" style="display:none;" onclick="openModal('shareModal')">SHARE NEW SNIPPET</button>
</div>

<div id="shareModal" class="modal">
    <h3>New Snippet</h3>
    <input id="sName" placeholder="Snippet Name">
    <input id="sType" placeholder="Work Type">
    <textarea id="sCode" rows="5" placeholder="Paste your code here..."></textarea>
    <textarea id="sComment" placeholder="Initial comment..."></textarea>
    <button onclick="postSnippet()">SUBMIT</button>
    <button onclick="closeModal('shareModal')">CLOSE</button>
</div>

<div id="viewModal" class="modal">
    <h3 id="vName"></h3>
    <pre id="vCode" style="background:#000; padding:10px; border:1px solid #333; overflow:auto;"></pre>
    <div id="vCommentsList"></div>
    <div id="commentSection"></div>
    <button onclick="closeModal('viewModal')">CLOSE</button>
</div>

<nav>
    <button onclick="showPage('homePage')">HOME</button>
    <button onclick="showPage('profilePage')">PROFILE</button>
</nav>

<script>
    const BASE_URL = "https://slace-4d2ae-default-rtdb.asia-southeast1.firebasedatabase.app";
    let allSnippets = [];

    function showPage(id) { document.querySelectorAll('.page').forEach(function(p) { p.style.display = 'none'; }); document.getElementById(id).style.display = 'block'; }
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Logout Function
    function logout() {
        localStorage.removeItem('currentUser');
        location.reload();
    }

    async function handleAuth() {
        const name = document.getElementById('userName').value;
        const pass = document.getElementById('userPass').value;
        const response = await fetch(BASE_URL + "/users.json");
        const users = await response.json();
        
        let userObject = { name: name, email: document.getElementById('userEmail').value, level: document.getElementById('userLevel').value, pass: pass };
        let userFound = false;
        
        for (let key in users) {
            if (users[key].name === name) {
                if (users[key].pass === pass) { userObject = users[key]; userFound = true; }
                else { alert("sorry but you entering wrong password we dont approve you !"); return; }
            }
        }
        if (!userFound) await fetch(BASE_URL + "/users.json", { method: 'POST', body: JSON.stringify(userObject) });
        
        localStorage.setItem('currentUser', JSON.stringify(userObject));
        location.reload();
    }

    async function fetchSnippets() {
        const response = await fetch(BASE_URL + "/snippets.json");
        const data = await response.json();
        allSnippets = [];
        const listElement = document.getElementById('snippetList');
        listElement.innerHTML = '';
        const loggedUser = JSON.parse(localStorage.getItem('currentUser'));
        let sharedCount = 0;

        for (let id in data) {
            let snippet = data[id];
            snippet.id = id;
            allSnippets.push(snippet);
            if (loggedUser && snippet.owner === loggedUser.name) sharedCount++;
            
            const divElement = document.createElement('div');
            divElement.className = 'card';
            divElement.innerHTML = '<strong>' + snippet.name + '</strong><br><small>Type: ' + (snippet.workType || 'N/A') + ' | Watched: ' + (snippet.watched || 0) + '</small>';
            divElement.onclick = function() {
                updateWatched(snippet.id, snippet);
                document.getElementById('vName').innerText = snippet.name;
                document.getElementById('vCode').innerText = snippet.code;
                let commentsHtml = "<strong>Comments:</strong><br>";
                if (snippet.comments) {
                    for (let cId in snippet.comments) commentsHtml += '<p style="font-size:0.8em;">- ' + snippet.comments[cId].user + ': ' + snippet.comments[cId].text + '</p>';
                }
                document.getElementById('vCommentsList').innerHTML = commentsHtml;
                document.getElementById('commentSection').innerHTML = '<textarea id="newComment" placeholder="Apna comment..."></textarea><button onclick="addComment(\'' + snippet.id + '\')">POST COMMENT</button>';
                openModal('viewModal');
            };
            listElement.appendChild(divElement);
        }
        if (loggedUser) document.getElementById('cShared').innerText = "Shared: " + sharedCount;
    }

    async function updateWatched(snippetId, snippet) {
        await fetch(BASE_URL + "/snippets/" + snippetId + ".json", { method: 'PATCH', body: JSON.stringify({ watched: (snippet.watched || 0) + 1 }) });
    }

    async function addComment(id) {
        const commentText = document.getElementById('newComment').value;
        const loggedUser = JSON.parse(localStorage.getItem('currentUser'));
        await fetch(BASE_URL + "/snippets/" + id + "/comments.json", { method: 'POST', body: JSON.stringify({ user: loggedUser ? loggedUser.name : "Anonymous", text: commentText }) });
        closeModal('viewModal'); fetchSnippets();
    }

    async function postSnippet() {
        const loggedUser = JSON.parse(localStorage.getItem('currentUser'));
        await fetch(BASE_URL + "/snippets.json", { method: 'POST', body: JSON.stringify({ name: document.getElementById('sName').value, workType: document.getElementById('sType').value, code: document.getElementById('sCode').value, owner: loggedUser ? loggedUser.name : "Anonymous", watched: 0 }) });
        closeModal('shareModal'); fetchSnippets();
    }

    function filterSnippets() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        document.getElementById('snippetList').innerHTML = '';
        allSnippets.forEach(function(s) {
            if (s.name.toLowerCase().includes(query)) {
                const div = document.createElement('div'); div.className = 'card'; div.innerHTML = '<strong>' + s.name + '</strong>';
                div.onclick = function() { openModal('viewModal'); };
                document.getElementById('snippetList').appendChild(div);
            }
        });
    }

    const savedUser = JSON.parse(localStorage.getItem('currentUser'));
    if (savedUser) {
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('idCard').style.display = 'block';
        document.getElementById('shareBtn').style.display = 'block';
        document.getElementById('cName').innerText = "Name: " + savedUser.name;
        document.getElementById('cEmail').innerText = "Email: " + savedUser.email;
        document.getElementById('cLevel').innerText = "Level: " + savedUser.level;
    }
    fetchSnippets();
</script>
</body>
</html>
